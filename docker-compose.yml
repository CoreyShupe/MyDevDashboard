# Local PostgreSQL for the Mac Dev Dashboard.
#
# Data is stored in a NAMED external volume (`macdevdash_pgdata`) so it survives
# `docker compose down`, container recreation, and even `docker system prune`
# (prune only removes *anonymous*/dangling volumes, never named ones referenced
# here as `external: true`). Create it once with `./scripts/db-up.sh`.

services:
  postgres:
    image: postgres:18
    container_name: macdevdash_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devdash}
      POSTGRES_DB: ${POSTGRES_DB:-devdash}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Postgres 18+ expects a SINGLE mount at /var/lib/postgresql; it stores data in a
      # versioned subdir (e.g. /var/lib/postgresql/18/docker) beneath it. Mounting the old
      # /var/lib/postgresql/data path here would leave the real data OUTSIDE the volume.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devdash} -d ${POSTGRES_DB:-devdash}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  # Marked `external` so it is NEVER auto-created anonymously and NEVER pruned.
  # `./scripts/db-up.sh` creates it explicitly the first time.
  pgdata:
    external: true
    name: macdevdash_pgdata
